version: "2"
sql:
  - engine: "mysql"
    queries: "queries/"
    schema: "../internal/database/migrations/"
    database:
      uri: ${DATABASE_URL}
      managed: false
    gen:
      go:
        package: "sqlc"
        out: "../internal/database/sqlc"
        emit_json_tags: true
        emit_empty_slices: true
