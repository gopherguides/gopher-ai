name: Integration Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-installation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history is required: the "legacy-skill-hashes.txt matches git
          # history exactly" test compares the committed manifest against
          # `git rev-list --objects --all`. Shallow checkouts only see current
          # commits, so the test would (correctly) flag every historical pair
          # in the manifest as "extra" and fail.
          fetch-depth: 0

      - name: Test plugin installation
        run: ./scripts/test-installation.sh

  test-commands:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Test command files
        run: ./scripts/test-commands.sh

  test-hooks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Test hook files
        run: ./scripts/test-hooks.sh

  check-shared-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check shared files are in sync
        run: ./scripts/check-shared-sync.sh
